name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Run standard test suite
        run: cargo test

  real-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Run live end-to-end suite
        run: cargo test --test real_e2e -- --ignored --test-threads=1 --nocapture

  publish-image:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
      - real-e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build image
        run: >-
          docker build --pull
          --label org.opencontainers.image.title=vampire
          --label org.opencontainers.image.description=Rust\ proxy\ for\ read-only\ PyPI,\ npm,\ and\ Cargo\ package\ installs
          --label org.opencontainers.image.source=https://github.com/${{ github.repository }}
          --label org.opencontainers.image.revision=${{ github.sha }}
          -t ${IMAGE_NAME}:latest
          -t ${IMAGE_NAME}:${{ github.ref_name }}
          .
      - name: Push image
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${{ github.ref_name }}"
