name: ci

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: procyon-vampire
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run standard test suite
        run: cargo test

  real-e2e:
    runs-on: procyon-vampire
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run live end-to-end suite
        run: cargo test --test real_e2e -- --ignored --test-threads=1 --nocapture

  publish-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - test
      - real-e2e
    runs-on: procyon-vampire
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build image
        run: >-
          docker build --pull
          --label org.opencontainers.image.title=vampire
          --label org.opencontainers.image.description=Rust\ proxy\ for\ read-only\ PyPI,\ npm,\ and\ Cargo\ package\ installs
          --label org.opencontainers.image.source=https://github.com/${{ github.repository }}
          --label org.opencontainers.image.revision=${{ github.sha }}
          -t ${IMAGE_NAME}:latest
          -t ${IMAGE_NAME}:sha-${{ github.sha }}
          .
      - name: Push image
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:sha-${{ github.sha }}"
